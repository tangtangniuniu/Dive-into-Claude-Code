<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 860"
     font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <!-- =================== Defs =================== -->
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arGray" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#777"/>
    </marker>

    <!-- layer panel fills (very light, similar to original) -->
    <linearGradient id="surfBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e1ecf5"/>
      <stop offset="100%" stop-color="#cee0ee"/>
    </linearGradient>
    <linearGradient id="coreBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dde8f3"/>
      <stop offset="100%" stop-color="#c8d8ea"/>
    </linearGradient>
    <linearGradient id="safetyBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8ece2"/>
      <stop offset="100%" stop-color="#b8dcc8"/>
    </linearGradient>
    <linearGradient id="backBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e6eb"/>
      <stop offset="100%" stop-color="#cdd2d8"/>
    </linearGradient>
    <linearGradient id="stateBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efe2c5"/>
      <stop offset="100%" stop-color="#dfcb98"/>
    </linearGradient>

    <!-- node fills -->
    <linearGradient id="nodeWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f3f7"/>
    </linearGradient>
    <linearGradient id="nodeOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff1de"/>
      <stop offset="100%" stop-color="#ffd9a8"/>
    </linearGradient>
    <linearGradient id="nodeYellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffbcc"/>
      <stop offset="100%" stop-color="#ffe48a"/>
    </linearGradient>
  </defs>

  <!-- =================== Background =================== -->
  <rect width="1480" height="860" fill="#ffffff"/>

  <!-- =================== Layer panels =================== -->
  <!-- Surface Layer panel -->
  <rect x="20" y="40" width="300" height="540" rx="14"
        fill="url(#surfBg)" stroke="#88a4bd" stroke-width="1.6"/>
  <!-- Core Layer panel -->
  <rect x="340" y="40" width="240" height="540" rx="14"
        fill="url(#coreBg)" stroke="#7a99b8" stroke-width="1.6"/>
  <!-- Safety/Action Layer panel -->
  <rect x="600" y="40" width="540" height="540" rx="14"
        fill="url(#safetyBg)" stroke="#69a288" stroke-width="1.6"/>
  <!-- Backend Layer panel -->
  <rect x="1160" y="40" width="300" height="540" rx="14"
        fill="url(#backBg)" stroke="#888d94" stroke-width="1.6"/>

  <!-- Layer titles (with ▶) -->
  <g font-size="18" font-weight="800" fill="#1f2a36">
    <text x="40"   y="68">▶ Surface Layer</text>
    <text x="360"  y="68">▶ Core Layer</text>
    <text x="620"  y="68">▶ Safety / Action Layer</text>
    <text x="1180" y="68">▶ Backend Layer</text>
  </g>

  <!-- =================== State Layer (bottom, full width) =================== -->
  <rect x="20" y="640" width="1440" height="200" rx="14"
        fill="url(#stateBg)" stroke="#a8884a" stroke-width="1.6"/>
  <text x="40" y="668" font-size="18" font-weight="800" fill="#3d2c10">▶ State Layer</text>

  <!-- ================================================================ -->
  <!-- Surface Layer nodes                                                -->
  <!-- ================================================================ -->
  <g font-size="13" font-weight="700" fill="#1c2532">
    <!-- 4 input sources -->
    <rect x="40"  y="100" width="140" height="46" rx="9" fill="url(#nodeWhite)" stroke="#5d7e9d" stroke-width="1.4"/>
    <text x="110" y="129" text-anchor="middle">Interactive CLI</text>

    <rect x="40"  y="170" width="140" height="46" rx="9" fill="url(#nodeWhite)" stroke="#5d7e9d" stroke-width="1.4"/>
    <text x="110" y="192" text-anchor="middle" font-size="12">IDE/Desktop/</text>
    <text x="110" y="208" text-anchor="middle" font-size="12">Browser</text>

    <rect x="40"  y="240" width="140" height="46" rx="9" fill="url(#nodeWhite)" stroke="#5d7e9d" stroke-width="1.4"/>
    <text x="110" y="269" text-anchor="middle">Headless CLI</text>

    <rect x="40"  y="310" width="140" height="46" rx="9" fill="url(#nodeWhite)" stroke="#5d7e9d" stroke-width="1.4"/>
    <text x="110" y="339" text-anchor="middle">Agent SDK</text>

    <!-- UI/Render hub -->
    <rect x="220" y="170" width="80" height="186" rx="14" fill="url(#nodeWhite)" stroke="#34516f" stroke-width="1.6"/>
    <text x="260" y="258" text-anchor="middle" font-size="14">UI /</text>
    <text x="260" y="278" text-anchor="middle" font-size="14">Render</text>
  </g>

  <!-- 4 source -> UI/Render -->
  <g stroke="#555" stroke-width="1.4" fill="none">
    <line x1="180" y1="123" x2="218" y2="200" marker-end="url(#arGray)"/>
    <line x1="180" y1="193" x2="218" y2="230" marker-end="url(#arGray)"/>
    <line x1="180" y1="263" x2="218" y2="290" marker-end="url(#arGray)"/>
    <line x1="180" y1="333" x2="218" y2="320" marker-end="url(#arGray)"/>
  </g>
  <!-- channel labels -->
  <text x="200" y="225" font-size="10" fill="#555" font-style="italic">headless</text>
  <text x="200" y="237" font-size="10" fill="#555" font-style="italic">request</text>
  <text x="200" y="345" font-size="10" fill="#555" font-style="italic">programmatic</text>
  <text x="200" y="357" font-size="10" fill="#555" font-style="italic">query</text>

  <!-- UI/Render <-> Agent Loop (bidirectional) -->
  <g stroke="#333" stroke-width="1.6" fill="none">
    <line x1="300" y1="210" x2="378" y2="200" marker-end="url(#ar)"/>
    <line x1="378" y1="280" x2="302" y2="290" marker-end="url(#ar)"/>
  </g>
  <text x="324" y="195" font-size="11" font-style="italic" fill="#333">submit/</text>
  <text x="324" y="207" font-size="11" font-style="italic" fill="#333">interrupt</text>
  <text x="320" y="305" font-size="11" font-style="italic" fill="#333">output/</text>
  <text x="320" y="317" font-size="11" font-style="italic" fill="#333">progress</text>

  <!-- ================================================================ -->
  <!-- Core Layer nodes                                                   -->
  <!-- ================================================================ -->
  <!-- Agent Loop -->
  <g>
    <rect x="378" y="180" width="184" height="100" rx="14" fill="url(#nodeWhite)" stroke="#34516f" stroke-width="1.8"/>
    <text x="470" y="237" text-anchor="middle" font-size="20" font-weight="800" fill="#1f2a36">Agent Loop</text>
  </g>
  <!-- Compaction Pipeline -->
  <g>
    <rect x="378" y="430" width="184" height="86" rx="14" fill="url(#nodeWhite)" stroke="#34516f" stroke-width="1.8"/>
    <text x="470" y="468" text-anchor="middle" font-size="16" font-weight="800" fill="#1f2a36">Compaction</text>
    <text x="470" y="490" text-anchor="middle" font-size="16" font-weight="800" fill="#1f2a36">Pipeline</text>
  </g>

  <!-- Agent Loop <-> Compaction connections -->
  <g stroke="#333" stroke-width="1.6" fill="none">
    <line x1="420" y1="282" x2="420" y2="428" marker-end="url(#ar)"/>
    <line x1="510" y1="428" x2="510" y2="282" marker-end="url(#ar)"/>
  </g>
  <text x="378" y="350" font-size="11" font-style="italic" fill="#333">pre-model</text>
  <text x="378" y="362" font-size="11" font-style="italic" fill="#333">shapers</text>
  <text x="520" y="358" font-size="11" font-style="italic" fill="#333">compacted</text>
  <text x="520" y="370" font-size="11" font-style="italic" fill="#333">context</text>

  <!-- ================================================================ -->
  <!-- Safety/Action Layer nodes                                          -->
  <!-- ================================================================ -->
  <!-- Inner orange-dashed group: Permission System + Hook Pipeline -->
  <rect x="630" y="150" width="220" height="240" rx="14"
        fill="none" stroke="#d77a2a" stroke-width="1.8" stroke-dasharray="6 4"/>

  <!-- Permission System + auto classifier -->
  <g>
    <rect x="650" y="170" width="184" height="86" rx="12" fill="url(#nodeOrange)" stroke="#c9742a" stroke-width="1.6"/>
    <text x="742" y="200" text-anchor="middle" font-size="14" font-weight="800" fill="#3a2208">Permission System</text>
    <text x="742" y="222" text-anchor="middle" font-size="13" fill="#3a2208">+ auto classifier</text>
  </g>

  <!-- Hook Pipeline -->
  <g>
    <rect x="650" y="298" width="184" height="68" rx="12" fill="url(#nodeYellow)" stroke="#caa800" stroke-width="1.6"/>
    <text x="742" y="338" text-anchor="middle" font-size="15" font-weight="800" fill="#3a2208">Hook Pipeline</text>
  </g>

  <!-- lifecycle events / modify decision (between perm & hook) -->
  <g stroke="#333" stroke-width="1.4" fill="none">
    <line x1="700" y1="258" x2="700" y2="296" marker-end="url(#ar)"/>
    <line x1="780" y1="296" x2="780" y2="258" marker-end="url(#ar)"/>
  </g>
  <text x="585" y="278" font-size="10.5" font-style="italic" fill="#333">lifecycle</text>
  <text x="585" y="290" font-size="10.5" font-style="italic" fill="#333">events</text>
  <text x="790" y="278" font-size="10.5" font-style="italic" fill="#333">modify</text>
  <text x="790" y="290" font-size="10.5" font-style="italic" fill="#333">decision</text>

  <!-- Right side: tools / extensibility / subagent -->
  <g font-size="13" font-weight="700" fill="#1c2532">
    <rect x="900"  y="100" width="216" height="56" rx="10" fill="url(#nodeWhite)" stroke="#3d7c5a" stroke-width="1.4"/>
    <text x="1008" y="124" text-anchor="middle" font-weight="800">Extensibility</text>
    <text x="1008" y="142" text-anchor="middle" font-size="11">(plugins &amp; skills)</text>

    <rect x="900"  y="190" width="216" height="50" rx="10" fill="url(#nodeWhite)" stroke="#3d7c5a" stroke-width="1.4"/>
    <text x="1008" y="220" text-anchor="middle" font-weight="800">Built-in Tools</text>

    <rect x="900"  y="260" width="216" height="50" rx="10" fill="url(#nodeWhite)" stroke="#3d7c5a" stroke-width="1.4"/>
    <text x="1008" y="290" text-anchor="middle" font-weight="800">MCP Tools</text>

    <rect x="900"  y="330" width="216" height="50" rx="10" fill="url(#nodeWhite)" stroke="#3d7c5a" stroke-width="1.4"/>
    <text x="1008" y="360" text-anchor="middle" font-weight="800">Subagent spawning</text>
  </g>

  <!-- Y/N gates from Permission box -> right tools -->
  <g stroke="#333" stroke-width="1.4" fill="none">
    <line x1="836" y1="190" x2="898" y2="160" marker-end="url(#ar)"/>
    <line x1="836" y1="210" x2="898" y2="215" marker-end="url(#ar)"/>
    <line x1="836" y1="230" x2="898" y2="285" marker-end="url(#ar)"/>
    <line x1="836" y1="335" x2="898" y2="355" marker-end="url(#ar)"/>
  </g>
  <g font-size="11" font-weight="700" fill="#333">
    <text x="864" y="166">Y/N</text>
    <text x="864" y="208">Y/N</text>
    <text x="864" y="270">Y/N</text>
    <text x="864" y="328">Y/N</text>
  </g>

  <!-- Agent Loop -> Permission System (approval dialog / tool request) -->
  <g stroke="#333" stroke-width="1.6" fill="none">
    <line x1="562" y1="200" x2="648" y2="190" marker-end="url(#ar)"/>
    <line x1="562" y1="240" x2="648" y2="225" marker-end="url(#ar)"/>
  </g>
  <text x="600" y="178" font-size="11" font-style="italic" fill="#333">approval dialog</text>
  <text x="600" y="262" font-size="11" font-style="italic" fill="#333">tool request</text>

  <!-- Subagent return (summary only) -->
  <line x1="900" y1="370" x2="600" y2="450" stroke="#777" stroke-width="1.3" stroke-dasharray="5 3" fill="none" marker-end="url(#arGray)"/>
  <text x="700" y="430" font-size="11" font-style="italic" fill="#555">summary only return</text>

  <!-- tool surface labels (between perm box & right tools area) -->
  <text x="864" y="244" font-size="10.5" font-style="italic" fill="#444">tool surface</text>

  <!-- ================================================================ -->
  <!-- Backend Layer nodes                                                -->
  <!-- ================================================================ -->
  <g font-size="14" font-weight="800" fill="#1c2532">
    <rect x="1180" y="120" width="240" height="64" rx="12" fill="url(#nodeWhite)" stroke="#666" stroke-width="1.6"/>
    <text x="1300" y="158" text-anchor="middle">Execution Backends</text>

    <rect x="1180" y="270" width="240" height="64" rx="12" fill="url(#nodeWhite)" stroke="#666" stroke-width="1.6"/>
    <text x="1300" y="308" text-anchor="middle">External Resources</text>
  </g>
  <!-- Shell sandbox (between safety/action and backend, near boundary) -->
  <g>
    <rect x="1040" y="200" width="120" height="50" rx="10" fill="url(#nodeWhite)" stroke="#3d7c5a" stroke-width="1.6"/>
    <text x="1100" y="230" text-anchor="middle" font-size="13" font-weight="800" fill="#1c2532">Shell sandbox</text>
  </g>
  <!-- Built-in Tools -> Shell sandbox  (shell commands) -->
  <line x1="1116" y1="215" x2="1038" y2="225" stroke="#333" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="1050" y="194" font-size="11" font-style="italic" fill="#333">shell commands</text>
  <!-- Shell sandbox -> Execution Backends (sandboxed execution) -->
  <line x1="1160" y1="220" x2="1180" y2="160" stroke="#333" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="1140" y="172" font-size="11" font-style="italic" fill="#333">sandboxed</text>
  <text x="1140" y="184" font-size="11" font-style="italic" fill="#333">execution</text>

  <!-- Execution Backends <-> External Resources -->
  <g stroke="#333" stroke-width="1.5" fill="none">
    <line x1="1280" y1="186" x2="1280" y2="268" marker-end="url(#ar)"/>
    <line x1="1320" y1="268" x2="1320" y2="186" marker-end="url(#ar)"/>
  </g>
  <text x="1338" y="222" font-size="11" font-style="italic" fill="#333">local /</text>
  <text x="1338" y="234" font-size="11" font-style="italic" fill="#333">cloud /</text>
  <text x="1338" y="246" font-size="11" font-style="italic" fill="#333">remote</text>

  <!-- Right tools -> External Resources (general edge) -->
  <line x1="1118" y1="280" x2="1180" y2="290" stroke="#666" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arGray)"/>
  <line x1="1118" y1="350" x2="1180" y2="310" stroke="#666" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arGray)"/>

  <!-- ================================================================ -->
  <!-- State Layer nodes (5 across)                                       -->
  <!-- ================================================================ -->
  <g font-size="13" font-weight="800" fill="#3d2c10">
    <rect x="60"   y="700" width="220" height="100" rx="12" fill="#fbf3df" stroke="#9c6a18" stroke-width="1.5"/>
    <text x="170"  y="755" text-anchor="middle">Context Assembly</text>

    <rect x="320"  y="700" width="220" height="100" rx="12" fill="#fbf3df" stroke="#9c6a18" stroke-width="1.5"/>
    <text x="430"  y="755" text-anchor="middle">Runtime State</text>

    <rect x="580"  y="700" width="240" height="100" rx="12" fill="#fbf3df" stroke="#9c6a18" stroke-width="1.5"/>
    <text x="700"  y="755" text-anchor="middle">Session Persistence</text>

    <rect x="860"  y="700" width="240" height="100" rx="12" fill="#fbf3df" stroke="#9c6a18" stroke-width="1.5"/>
    <text x="980"  y="747" text-anchor="middle">CLAUDE.md</text>
    <text x="980"  y="767" text-anchor="middle">+ memory</text>

    <rect x="1140" y="700" width="280" height="100" rx="12" fill="#fbf3df" stroke="#9c6a18" stroke-width="1.5"/>
    <text x="1280" y="747" text-anchor="middle">Sidechain</text>
    <text x="1280" y="767" text-anchor="middle">Transcriptions</text>
  </g>

  <!-- State -> Compaction / Core (upward arrows with labels) -->
  <g stroke="#333" stroke-width="1.4" fill="none">
    <line x1="170" y1="700" x2="400" y2="520" marker-end="url(#ar)"/>
    <line x1="430" y1="700" x2="430" y2="520" marker-end="url(#ar)"/>
    <line x1="700" y1="700" x2="540" y2="520" marker-end="url(#ar)"/>
    <line x1="980" y1="700" x2="900" y2="395" marker-end="url(#ar)"/>
    <line x1="1280" y1="700" x2="1015" y2="395" marker-end="url(#ar)"/>
  </g>
  <g font-size="11" font-style="italic" fill="#333">
    <text x="200" y="630">system prompt</text>
    <text x="395" y="630">mutate state</text>
    <text x="600" y="618">transcript</text>
    <text x="600" y="630">Resume/fork</text>
    <text x="870" y="618">CLAUDE.md</text>
    <text x="870" y="630">+ memory</text>
    <text x="1140" y="618">subagent</text>
    <text x="1140" y="630">transcript</text>
  </g>

  <!-- =================== Footer =================== -->
  <text x="740" y="850" text-anchor="middle" font-size="12" fill="#777" font-style="italic">
    Layered architecture — Surface · Core · Safety/Action · Backend, all backed by a shared State Layer
  </text>
</svg>
